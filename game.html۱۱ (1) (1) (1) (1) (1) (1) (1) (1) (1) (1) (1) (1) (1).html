<!DOCTYPE html><html lang="fa"><head><meta charset="UTF-8"><title>Color Blast Arena — موبایل + دسکتاپ</title><meta name="viewport" content="width=device-width, initial-scale=1"><style>    * { box-sizing: border-box; }    body {        margin: 0;        background: #020617;        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;        color: #e5e7eb;        direction: rtl;        overflow: hidden;        touch-action: none;    }    #gameCanvas {        display: block;        margin: 0 auto;        background: radial-gradient(circle at center, #020617 0%, #000 70%);    }    #ui {        position: absolute;        top: 10px;        right: 10px;        z-index: 10;        text-align: right;        pointer-events: none;    }    #ui div {        margin-bottom: 4px;        font-size: 13px;    }    .score { color: #38bdf8; font-size: 17px; }    .hp { color: #f97316; }    .combo { color: #22c55e; }    .event { color: #facc15; }    .time { color: #e5e7eb; }    #centerOverlay {        position: absolute;        inset: 0;        display: flex;        align-items: center;        justify-content: center;        flex-direction: column;        background: radial-gradient(circle at center, rgba(15,23,42,0.9), rgba(0,0,0,0.95));        color: #e5e7eb;        z-index: 20;    }    #centerOverlay h1 {        margin: 0 0 10px;        font-size: 30px;        color: #f97316;        text-shadow: 0 0 20px #fb7185;    }    #centerOverlay p {        margin: 4px 0;        font-size: 13px;        color: #9ca3af;        text-align: center;    }    #centerOverlay button {        margin-top: 12px;        padding: 8px 20px;        border-radius: 999px;        border: none;        background: linear-gradient(90deg, #22c55e, #38bdf8);        color: #020617;        font-weight: bold;        cursor: pointer;        box-shadow: 0 0 18px rgba(56,189,248,0.8);        pointer-events: auto;        font-size: 13px;    }    #centerOverlay button:hover {        filter: brightness(1.1);    }    #bigText {        position: absolute;        left: 50%;        top: 20%;        transform: translateX(-50%);        font-size: 26px;        color: #facc15;        text-shadow: 0 0 20px #f97316;        opacity: 0;        pointer-events: none;        z-index: 15;    }    #dashBtn {        position: fixed;        bottom: 20px;        right: 20px;        width: 80px;        height: 80px;        border-radius: 50%;        background: rgba(15,23,42,0.9);        border: 2px solid #f97316;        color: #f97316;        font-size: 16px;        display: none;        z-index: 30;    }    @media (max-width: 768px) {        #ui div { font-size: 11px; }        .score { font-size: 14px; }    }</style></head><body><div id="ui">    <div class="score">امتیاز: 0</div>    <div class="hp">سلامتی: 100</div>    <div class="combo">کمبو: x1</div>    <div class="event">رویداد: —</div>    <div class="time">زمان: 0s</div></div><div id="bigText"></div><div id="centerOverlay">    <h1>Color Blast Arena</h1>    <p>دسکتاپ: حرکت با ماوس، شلیک خودکار، دَش با کلیک راست.</p>    <p>موبایل: حرکت با لمس، دَش با دکمه پایین راست.</p>    <button id="startBtn">شروع بازی</button></div><button id="dashBtn">DASH</button><canvas id="gameCanvas"></canvas><script>// تشخیص موبایلconst isMobileDevice = /Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent);const canvas = document.getElementById("gameCanvas");const ctx = canvas.getContext("2d");const uiScore = document.querySelector(".score");const uiHp = document.querySelector(".hp");const uiCombo = document.querySelector(".combo");const uiEvent = document.querySelector(".event");const uiTime = document.querySelector(".time");const overlay = document.getElementById("centerOverlay");const startBtn = document.getElementById("startBtn");const bigText = document.getElementById("bigText");const dashBtn = document.getElementById("dashBtn");function resizeGame() {    canvas.width = window.innerWidth;    canvas.height = window.innerHeight;}window.addEventListener("resize", resizeGame);resizeGame();let gameState = "menu";let MAX_PARTICLE_FACTOR = isMobileDevice ? 0.4 : 1;let GLOW_POWER = isMobileDevice ? 0.6 : 1;let player = {    x: canvas.width / 2,    y: canvas.height / 2,    size: 16,    baseSize: 16,    hp: 100,    maxHp: 100,    invincibleTime: 0,    dashReady: true,    dashTime: 0,    dashDir: { x: 0, y: 0 },    trail: []};let bullets = [];let enemies = [];let particles = [];let score = 0;let combo = 1;let comboTimer = 0;let lastSpawnTime = 0;let lastBulletTime = 0;let boss = null;let mousePos = { x: canvas.width / 2, y: canvas.height / 2 };let slowMotion = 0;let shakeTime = 0;let shakeStrength = 0;let gameTime = 0;let currentEvent = null;let eventTimer = 0;let nextEventTime = 8000;let bossTimer = 0;// کنترل دسکتاپif (!isMobileDevice) {    document.addEventListener("mousemove", (e) => {        const rect = canvas.getBoundingClientRect();        mousePos.x = e.clientX - rect.left;        mousePos.y = e.clientY - rect.top;    });    document.addEventListener("contextmenu", (e) => e.preventDefault());    document.addEventListener("mousedown", (e) => {        if (e.button === 2 && gameState === "playing") {            triggerDash();        }    });}// کنترل موبایلif (isMobileDevice) {    dashBtn.style.display = "block";    document.addEventListener("touchmove", (e) => {        const touch = e.touches[0];        const rect = canvas.getBoundingClientRect();        mousePos.x = touch.clientX - rect.left;        mousePos.y = touch.clientY - rect.top;    }, { passive: false });    dashBtn.addEventListener("touchstart", (e) => {        e.preventDefault();        if (gameState === "playing") triggerDash();    });}startBtn.addEventListener("click", () => {    resetGame();    gameState = "playing";    overlay.style.display = "none";    showBigText("ARENA START", "#f97316");});function resetGame() {    player.x = canvas.width / 2;    player.y = canvas.height / 2;    player.hp = player.maxHp;    player.invincibleTime = 0;    player.dashReady = true;    player.dashTime = 0;    player.trail = [];    bullets = [];    enemies = [];    particles = [];    score = 0;    combo = 1;    comboTimer = 0;    boss = null;    slowMotion = 0;    shakeTime = 0;    shakeStrength = 0;    gameTime = 0;    currentEvent = null;    eventTimer = 0;    nextEventTime = 8000;    bossTimer = 0;    uiScore.textContent = "امتیاز: " + score;    uiHp.textContent = "سلامتی: " + player.hp;    uiCombo.textContent = "کمبو: x" + combo;    uiEvent.textContent = "رویداد: —";    uiTime.textContent = "زمان: 0s";}function triggerDash() {    if (!player.dashReady) return;    const dx = mousePos.x - player.x;    const dy = mousePos.y - player.y;    const len = Math.hypot(dx, dy) || 1;    player.dashDir.x = dx / len;    player.dashDir.y = dy / len;    player.dashTime = 220;    player.dashReady = false;    player.invincibleTime = 300;    slowMotion = 250;    shake(120, 6);    for (let i = 0; i < 35 * MAX_PARTICLE_FACTOR; i++) {        particles.push({            x: player.x,            y: player.y,            size: 2 + Math.random() * 3,            color: randomColor(),            vx: (Math.random() - 0.5) * 7,            vy: (Math.random() - 0.5) * 7,            life: 500 + Math.random() * 400        });    }    uiEvent.textContent = "رویداد: DASH BURST";    setTimeout(() => {        uiEvent.textContent = "رویداد: " + (currentEvent ? currentEvent.name : "—");    }, 800);    setTimeout(() => {        player.dashReady = true;    }, 3500);}function randomColor() {    const colors = [        "rgba(244,114,182,0.8)",        "rgba(56,189,248,0.8)",        "rgba(250,204,21,0.8)",        "rgba(34,197,94,0.8)",        "rgba(249,115,22,0.8)",        "rgba(147,51,234,0.8)"    ];    return colors[Math.floor(Math.random() * colors.length)];}function spawnEnemy() {    const types = ["chaser", "fast", "tank", "orbiter", "swarm"];    const type = types[Math.floor(Math.random() * types.length)];    const edge = Math.floor(Math.random() * 4);    let x, y;    if (edge === 0) { x = 0; y = Math.random() * canvas.height; }    else if (edge === 1) { x = canvas.width; y = Math.random() * canvas.height; }    else if (edge === 2) { x = Math.random() * canvas.width; y = 0; }    else { x = Math.random() * canvas.width; y = canvas.height; }    let baseSpeed = 1.6 + gameTime / 30000;    let hp = 1 + Math.floor(gameTime / 20000);    let size = 10;    if (type === "fast") {        baseSpeed *= 2.2;        size = 9;    } else if (type === "tank") {        baseSpeed *= 0.7;        hp += 3;        size = 16;    } else if (type === "orbiter") {        baseSpeed *= 1.1;        size = 11;    } else if (type === "swarm") {        baseSpeed *= 1.8;        size = 8;    }    enemies.push({        x, y,        size,        speed: baseSpeed,        hp,        type,        angle: Math.random() * Math.PI * 2,        orbitAngle: Math.random() * Math.PI * 2    });}function spawnBoss() {    boss = {        x: canvas.width / 2,        y: -100,        size: 52,        hp: 120 + gameTime / 8000,        maxHp: 120 + gameTime / 8000,        phase: 1,        timer: 0    };    showBigText("BOSS INCOMING", "#fb7185");    shake(400, 10);}function spawnBullet() {    const now = performance.now();    const fireRate = 130 - Math.min(90, gameTime / 4000);    if (now - lastBulletTime < fireRate) return;    lastBulletTime = now;    const angle = Math.atan2(mousePos.y - player.y, mousePos.x - player.x);    const spread = 0.12;    const count = 2 + Math.floor(gameTime / 25000);    for (let i = 0; i < count; i++) {        const a = angle + (i - (count - 1) / 2) * spread;        bullets.push({            x: player.x,            y: player.y,            size: 5,            speed: 7.5,            angle: a,            life: 900,            playerBullet: true        });    }    for (let i = 0; i < 6 * MAX_PARTICLE_FACTOR; i++) {        particles.push({            x: player.x,            y: player.y,            size: 2 + Math.random() * 2,            color: randomColor(),            vx: (Math.random() - 0.5) * 2,            vy: (Math.random() - 0.5) * 2,            life: 300 + Math.random() * 200        });    }}function updatePlayer(dt) {    if (player.dashTime > 0) {        const dashSpeed = 12;        player.x += player.dashDir.x * dashSpeed;        player.y += player.dashDir.y * dashSpeed;        player.dashTime -= dt;    } else {        player.x += (mousePos.x - player.x) * 0.18;        player.y += (mousePos.y - player.y) * 0.18;    }    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));    if (player.invincibleTime > 0) {        player.invincibleTime -= dt;    }    const targetSize = player.baseSize + Math.min(10, combo * 1.3);    player.size += (targetSize - player.size) * 0.1;    player.trail.push({ x: player.x, y: player.y, life: 400 });    if (player.trail.length > 40) player.trail.shift();}function updateBullets(dt) {    bullets = bullets.filter(b => {        b.x += Math.cos(b.angle) * b.speed;        b.y += Math.sin(b.angle) * b.speed;        b.life -= dt;        return b.life > 0 &&               b.x > -60 && b.x < canvas.width + 60 &&               b.y > -60 && b.y < canvas.height + 60;    });}function updateEnemies(dt) {    enemies = enemies.filter(e => {        const dx = player.x - e.x;        const dy = player.y - e.y;        const dist = Math.hypot(dx, dy) || 1;        const angle = Math.atan2(dy, dx);        if (e.type === "chaser" || e.type === "fast" || e.type === "swarm") {            e.x += Math.cos(angle) * e.speed;            e.y += Math.sin(angle) * e.speed;        } else if (e.type === "tank") {            e.x += Math.cos(angle) * e.speed * 0.7;            e.y += Math.sin(angle) * e.speed * 0.7;        } else if (e.type === "orbiter") {            e.orbitAngle += 0.01 + gameTime * 0.000001;            e.x += Math.cos(angle) * e.speed * 0.7;            e.y += Math.sin(angle) * e.speed * 0.7;            e.x += Math.cos(e.orbitAngle) * 2.0;            e.y += Math.sin(e.orbitAngle) * 2.0;        }        bullets.forEach((b, bi) => {            if (!b.playerBullet) return;            if (Math.hypot(b.x - e.x, b.y - e.y) < e.size + b.size) {                bullets.splice(bi, 1);                e.hp--;                score += 10 * combo;                uiScore.textContent = "امتیاز: " + score;                combo++;                comboTimer = 2200;                for (let i = 0; i < 10 * MAX_PARTICLE_FACTOR; i++) {                    particles.push({                        x: e.x,                        y: e.y,                        size: 2 + Math.random() * 3,                        color: randomColor(),                        vx: (Math.random() - 0.5) * 3,                        vy: (Math.random() - 0.5) * 3,                        life: 400 + Math.random() * 300                    });                }            }        });        if (Math.hypot(player.x - e.x, player.y - e.y) < e.size + player.size) {            if (player.invincibleTime <= 0) {                player.hp -= (e.type === "tank" ? 18 : 10);                uiHp.textContent = "سلامتی: " + player.hp;                player.invincibleTime = 800;                combo = 1;                uiCombo.textContent = "کمبو: x" + combo;                slowMotion = 200;                shake(200, 8);                for (let i = 0; i < 18 * MAX_PARTICLE_FACTOR; i++) {                    particles.push({                        x: player.x,                        y: player.y,                        size: 2 + Math.random() * 3,                        color: "rgba(248,113,113,0.8)",                        vx: (Math.random() - 0.5) * 4,                        vy: (Math.random() - 0.5) * 4,                        life: 500 + Math.random() * 300                    });                }            }        }        return e.hp > 0 &&               e.x > -100 && e.x < canvas.width + 100 &&               e.y > -100 && e.y < canvas.height + 100;    });}function updateBoss(dt) {    if (!boss) return;    boss.timer += dt;    if (boss.y < 140) {        boss.y += 0.08 * dt;    }    const phase = boss.phase;    if (phase === 1) {        if (boss.timer > 600) {            boss.timer = 0;            bulletHellFromBoss(18, 3.8);        }    } else if (phase === 2) {        if (boss.timer > 450) {            boss.timer = 0;            spawnTitanWave();        }    } else if (phase === 3) {        if (boss.timer > 260) {            boss.timer = 0;            bulletHellFromBoss(26, 4.4);        }    }    bullets.forEach((b, bi) => {        if (!b.playerBullet) return;        if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size + b.size) {            bullets.splice(bi, 1);            boss.hp -= 2;            score += 20 * combo;            uiScore.textContent = "امتیاز: " + score;            combo += 2;            comboTimer = 2600;            shake(200, 6);            for (let i = 0; i < 16 * MAX_PARTICLE_FACTOR; i++) {                particles.push({                    x: boss.x,                    y: boss.y,                    size: 3 + Math.random() * 4,                    color: randomColor(),                    vx: (Math.random() - 0.5) * 4,                    vy: (Math.random() - 0.5) * 4,                    life: 600 + Math.random() * 400                });            }        }    });    if (Math.hypot(player.x - boss.x, player.y - boss.y) < boss.size + player.size) {        if (player.invincibleTime <= 0) {            player.hp -= 25;            uiHp.textContent = "سلامتی: " + player.hp;            player.invincibleTime = 1000;            combo = 1;            uiCombo.textContent = "کمبو: x" + combo;            slowMotion = 250;            shake(300, 10);        }    }    if (boss.hp <= boss.maxHp * 0.66 && boss.phase === 1) boss.phase = 2;    if (boss.hp <= boss.maxHp * 0.33 && boss.phase === 2) boss.phase = 3;    if (boss.hp <= 0) {        for (let i = 0; i < 70 * MAX_PARTICLE_FACTOR; i++) {            particles.push({                x: boss.x,                y: boss.y,                size: 3 + Math.random() * 5,                color: randomColor(),                vx: (Math.random() - 0.5) * 6,                vy: (Math.random() - 0.5) * 6,                life: 800 + Math.random() * 600            });        }        boss = null;        showBigText("BOSS DEFEATED", "#22c55e");        shake(400, 12);    }}function bulletHellFromBoss(count, speed) {    for (let i = 0; i < count; i++) {        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.2;        bullets.push({            x: boss.x,            y: boss.y,            size: 5,            speed,            angle,            life: 4000,            playerBullet: false        });    }    uiEvent.textContent = "رویداد: BULLET HELL";}function spawnTitanWave() {    for (let i = 0; i < 4; i++) {        enemies.push({            x: Math.random() * canvas.width,            y: Math.random() * canvas.height,            size: 26,            speed: 0.9,            hp: 10,            type: "tank",            angle: Math.random() * Math.PI * 2,            orbitAngle: 0        });    }    uiEvent.textContent = "رویداد: TITAN SPAWN";}function updateParticles(dt) {    particles = particles.filter(p => {        p.x += p.vx;        p.y += p.vy;        p.life -= dt;        return p.life > 0;    });    player.trail = player.trail.filter(t => {        t.life -= dt;        return t.life > 0;    });}function updateCombo(dt) {    if (comboTimer > 0) {        comboTimer -= dt;        if (comboTimer <= 0) {            combo = Math.max(1, Math.floor(combo * 0.5));        }    }    uiCombo.textContent = "کمبو: x" + combo;}function spawnLogic(dt) {    const now = performance.now();    const spawnInterval = 420 - Math.min(320, gameTime / 80);    if (now - lastSpawnTime > spawnInterval && enemies.length < 18 + gameTime / 5000) {        lastSpawnTime = now;        spawnEnemy();    }    bossTimer += dt;    if (!boss && bossTimer > 25000) {        bossTimer = 0;        spawnBoss();    }}function updateEvents(dt) {    gameTime += dt;    uiTime.textContent = "زمان: " + Math.floor(gameTime / 1000) + "s";    eventTimer += dt;    if (!currentEvent && eventTimer > nextEventTime) {        eventTimer = 0;        nextEventTime = 8000 + Math.random() * 6000;        triggerRandomEvent();    }    if (currentEvent && currentEvent.duration) {        currentEvent.time += dt;        if (currentEvent.time > currentEvent.duration) {            endCurrentEvent();        }    }}function triggerRandomEvent() {    const events = [        { name: "NEON STORM", type: "storm", duration: 4000, time: 0 },        { name: "DARK MODE", type: "dark", duration: 5000, time: 0 },        { name: "DOUBLE SPEED", type: "speed", duration: 5000, time: 0 },        { name: "TIME FREEZE", type: "freeze", duration: 3500, time: 0 },        { name: "GRAVITY PULSE", type: "gravity", duration: 3500, time: 0 }    ];    currentEvent = events[Math.floor(Math.random() * events.length)];    uiEvent.textContent = "رویداد: " + currentEvent.name;    showBigText(currentEvent.name, "#facc15");    if (currentEvent.type === "storm") {        neonStorm();    } else if (currentEvent.type === "speed") {        enemies.forEach(e => e.speed *= 1.7);    } else if (currentEvent.type === "freeze") {        slowMotion = 600;    } else if (currentEvent.type === "gravity") {        gravityPulse();    }}function endCurrentEvent() {    if (!currentEvent) return;    if (currentEvent.type === "speed") {        enemies.forEach(e => e.speed /= 1.7);    }    currentEvent = null;    uiEvent.textContent = "رویداد: —";}function neonStorm() {    for (let i = 0; i < 40; i++) {        const x = Math.random() * canvas.width;        const y = -20 - Math.random() * 100;        const angle = Math.PI / 2 + (Math.random() - 0.5) * 0.4;        bullets.push({            x,            y,            size: 4,            speed: 6 + Math.random() * 2,            angle,            life: 4000,            playerBullet: false        });    }    shake(300, 8);}function gravityPulse() {    for (let i = 0; i < 30 * MAX_PARTICLE_FACTOR; i++) {        particles.push({            x: canvas.width / 2,            y: canvas.height / 2,            size: 3 + Math.random() * 4,            color: randomColor(),            vx: (Math.random() - 0.5) * 2,            vy: (Math.random() - 0.5) * 2,            life: 600 + Math.random() * 400        });    }    enemies.forEach(e => {        const dx = canvas.width / 2 - e.x;        const dy = canvas.height / 2 - e.y;        const dist = Math.hypot(dx, dy) || 1;        e.x += dx / dist * 20;        e.y += dy / dist * 20;    });    shake(250, 7);}function shake(duration, strength) {    shakeTime = duration;    shakeStrength = strength;}function drawBackground() {    const gradient = ctx.createRadialGradient(        canvas.width / 2, canvas.height / 2, 0,        canvas.width / 2, canvas.height / 2, canvas.width    );    gradient.addColorStop(0, "#020617");    gradient.addColorStop(0.4, "#0b1120");    gradient.addColorStop(1, "#000000");    ctx.fillStyle = gradient;    ctx.fillRect(0, 0, canvas.width, canvas.height);    ctx.save();    ctx.strokeStyle = "rgba(15,23,42,0.7)";    ctx.lineWidth = 1;    for (let x = 0; x < canvas.width; x += 60) {        ctx.beginPath();        ctx.moveTo(x, 0);        ctx.lineTo(x, canvas.height);        ctx.stroke();    }    for (let y = 0; y < canvas.height; y += 60) {        ctx.beginPath();        ctx.moveTo(0, y);        ctx.lineTo(canvas.width, y);        ctx.stroke();    }    ctx.restore();    if (currentEvent && currentEvent.type === "dark") {        ctx.fillStyle = "rgba(0,0,0,0.7)";        ctx.fillRect(0, 0, canvas.width, canvas.height);    }}function drawPlayer() {    ctx.save();    player.trail.forEach(t => {        const alpha = t.life / 400;        ctx.fillStyle = randomColor().replace(/[\d.]+\)$/g, alpha + ")");        ctx.beginPath();        ctx.arc(t.x, t.y, player.size * 0.7, 0, Math.PI * 2);        ctx.fill();    });    const glow = ctx.createRadialGradient(        player.x, player.y, player.size * 0.2,        player.x, player.y, player.size * (2.4 * GLOW_POWER)    );    glow.addColorStop(0, "rgba(244,114,182,0.9)");    glow.addColorStop(0.5, "rgba(56,189,248,0.7)");    glow.addColorStop(1, "rgba(56,189,248,0)");    ctx.fillStyle = glow;    ctx.beginPath();    ctx.arc(player.x, player.y, player.size * (2.4 * GLOW_POWER), 0, Math.PI * 2);    ctx.fill();    ctx.fillStyle = player.invincibleTime > 0 ? "#f97316" : "#38bdf8";    ctx.beginPath();    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);    ctx.fill();    ctx.strokeStyle = "#0ea5e9";    ctx.lineWidth = 2;    ctx.beginPath();    ctx.arc(player.x, player.y, player.size + 3, 0, Math.PI * 2);    ctx.stroke();    ctx.restore();}function drawBullets() {    ctx.save();    bullets.forEach(b => {        const grad = ctx.createRadialGradient(            b.x, b.y, 0,            b.x, b.y, b.size * 3        );        grad.addColorStop(0, b.playerBullet ? "rgba(244,114,182,0.9)" : "rgba(248,250,252,0.9)");        grad.addColorStop(1, b.playerBullet ? "rgba(244,114,182,0)" : "rgba(248,250,252,0)");        ctx.fillStyle = grad;        ctx.beginPath();        ctx.arc(b.x, b.y, b.size * 3, 0, Math.PI * 2);        ctx.fill();        ctx.fillStyle = b.playerBullet ? "#f472b6" : "#e5e7eb";        ctx.beginPath();        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);        ctx.fill();    });    ctx.restore();}function drawEnemies() {    ctx.save();    enemies.forEach(e => {        const grad = ctx.createRadialGradient(            e.x, e.y, 0,            e.x, e.y, e.size * 2.5        );        grad.addColorStop(0, randomColor());        grad.addColorStop(1, "rgba(0,0,0,0)");        ctx.fillStyle = grad;        ctx.beginPath();        ctx.arc(e.x, e.y, e.size * 2.5, 0, Math.PI * 2);        ctx.fill();        ctx.fillStyle = "#ffffff";        ctx.beginPath();        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);        ctx.fill();        ctx.strokeStyle = "#111827";        ctx.lineWidth = 2;        ctx.beginPath();        ctx.arc(e.x, e.y, e.size + 2, 0, Math.PI * 2);        ctx.stroke();    });    ctx.restore();}function drawBoss() {    if (!boss) return;    ctx.save();    const grad = ctx.createRadialGradient(        boss.x, boss.y, 0,        boss.x, boss.y, boss.size * 3.5    );    grad.addColorStop(0, "rgba(249,115,22,0.95)");    grad.addColorStop(0.5, "rgba(244,114,182,0.8)");    grad.addColorStop(1, "rgba(244,114,182,0)");    ctx.fillStyle = grad;    ctx.beginPath();    ctx.arc(boss.x, boss.y, boss.size * 3.5, 0, Math.PI * 2);    ctx.fill();    ctx.fillStyle = "#f97316";    ctx.beginPath();    ctx.arc(boss.x, boss.y, boss.size, 0, Math.PI * 2);    ctx.fill();    ctx.strokeStyle = "#e5e7eb";    ctx.lineWidth = 3;    ctx.beginPath();    ctx.arc(boss.x, boss.y, boss.size + 4, 0, Math.PI * 2);    ctx.stroke();    const barWidth = 240;    const barHeight = 10;    const x = canvas.width / 2 - barWidth / 2;    const y = 30;    ctx.fillStyle = "#111827";    ctx.fillRect(x, y, barWidth, barHeight);    const ratio = boss.hp / boss.maxHp;    const gradBar = ctx.createLinearGradient(x, y, x + barWidth, y);    gradBar.addColorStop(0, "#22c55e");    gradBar.addColorStop(1, "#f97316");    ctx.fillStyle = gradBar;    ctx.fillRect(x, y, barWidth * ratio, barHeight);    ctx.strokeStyle = "#e5e7eb";    ctx.strokeRect(x, y, barWidth, barHeight);    ctx.restore();}function drawParticles() {    ctx.save();    particles.forEach(p => {        const alphaMatch = p.color.match(/rgba\((\d+),(\d+),(\d+),([\d.]+)\)/);        let baseAlpha = 0.6;        if (alphaMatch) baseAlpha = parseFloat(alphaMatch[4]);        const alpha = Math.max(0, (p.life / 800) * baseAlpha);        ctx.fillStyle = p.color.replace(/[\d.]+\)$/g, alpha + ")");        ctx.beginPath();        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);        ctx.fill();    });    ctx.restore();}function showBigText(text, color) {    bigText.textContent = text;    bigText.style.color = color;    bigText.style.opacity = "1";    bigText.style.transform = "translateX(-50%) scale(1.1)";    setTimeout(() => {        bigText.style.opacity = "0";        bigText.style.transform = "translateX(-50%) scale(1)";    }, 1200);}let lastTime = performance.now();function gameLoop(now) {    let dt = now - lastTime;    lastTime = now;    if (slowMotion > 0) {        slowMotion -= dt;        dt *= 0.4;    }    if (shakeTime > 0) {        shakeTime -= dt;        const dx = (Math.random() - 0.5) * shakeStrength;        const dy = (Math.random() - 0.5) * shakeStrength;        ctx.setTransform(1, 0, 0, 1, dx, dy);    } else {        ctx.setTransform(1, 0, 0, 1, 0, 0);    }    if (gameState === "playing") {        updatePlayer(dt);        spawnBullet();        updateBullets(dt);        updateEnemies(dt);        updateBoss(dt);        updateParticles(dt);        updateCombo(dt);        spawnLogic(dt);        updateEvents(dt);        bullets.forEach(b => {            if (!b.playerBullet) {                if (Math.hypot(player.x - b.x, player.y - b.y) < player.size + b.size) {                    if (player.invincibleTime <= 0) {                        player.hp -= 12;                        uiHp.textContent = "سلامتی: " + player.hp;                        player.invincibleTime = 700;                        combo = 1;                        uiCombo.textContent = "کمبو: x" + combo;                        slowMotion = 200;                        shake(200, 7);                    }                    b.life = 0;                }            }        });        bullets = bullets.filter(b => b.life > 0);        if (player.hp <= 0) {            gameState = "gameover";            overlay.style.display = "flex";            overlay.innerHTML = `                <h1>GAME OVER</h1>                <p>امتیاز نهایی: ${score}</p>                <p>زمان بقا: ${Math.floor(gameTime / 1000)} ثانیه</p>                <button id="restartBtn">شروع دوباره</button>            `;            document.getElementById("restartBtn").addEventListener("click", () => {                resetGame();                gameState = "playing";                overlay.style.display = "none";                showBigText("ARENA START", "#f97316");            });        }    }    drawBackground();    drawParticles();    drawBullets();    drawEnemies();    drawBoss();    drawPlayer();    requestAnimationFrame(gameLoop);}requestAnimationFrame(gameLoop);</script></body></html>
